<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Statement Converter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <main class="page-shell">
    <section class="hero-panel">
      <p class="eyebrow">Bank Statement Ingest</p>
      <h1>Convert raw bank PDFs and CSVs into one clean export.</h1>
      <p class="hero-copy">
        Upload a supported statement file and get a normalized CSV with
        <span>Transaction Date</span>, <span>Description</span>, and signed <span>Amount</span>.
      </p>
      <div class="supported-formats">
        <span>PDF</span>
        <span>CSV</span>
        <span>TSV</span>
        <span>TXT</span>
      </div>
    </section>

    <section class="workspace-panel">
      <form id="upload-form" class="upload-form">
        <label id="dropzone" class="dropzone" for="statement-file">
          <input id="statement-file" name="statement-file" type="file" accept=".pdf,.csv,.tsv,.txt" />
          <span class="dropzone-kicker">Drop a file here or browse</span>
          <strong id="file-name">No file selected</strong>
          <span class="dropzone-meta">Supports bank statement PDFs and direct bank-export CSV files.</span>
        </label>

        <button id="convert-button" class="convert-button" type="submit">Convert to CSV</button>
      </form>

      <section class="status-panel" aria-live="polite">
        <div id="status-badge" class="status-badge idle">Idle</div>
        <p id="status-message" class="status-message">Waiting for a file.</p>
        <a id="download-link" class="download-link hidden" download="normalized-statement.csv">Download normalized CSV</a>
      </section>
    </section>
  </main>

  <script src="/assets/app.js" defer></script>
</body>
</html>
